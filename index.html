<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماراثون الـ 100 سؤال المطوّر - أولى ثانوي</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-color: #1a1a1e;
            --btn-hover: #26262b;
            --text-color: #ffffff;
            --primary-blue: #8ab4f8;
            --success-green: #2d7d46;
            --error-red: #b3261e;
            --border-color: #333338;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .quiz-container {
            background-color: var(--card-color);
            width: 100%;
            max-width: 850px;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            position: relative;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .quiz-title {
            font-size: 1.2rem;
            color: #e3e3e3;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-counters {
            display: flex;
            gap: 10px;
        }

        .counter {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .counter.correct {
            background-color: rgba(45, 125, 70, 0.2);
            color: #81c784;
            border: 1px solid var(--success-green);
        }

        .counter.wrong {
            background-color: rgba(179, 38, 30, 0.2);
            color: #e57373;
            border: 1px solid var(--error-red);
        }

        .progress-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            gap: 15px;
        }

        .progress-text {
            font-size: 0.95rem;
            color: #b3b3b3;
            min-width: 70px;
        }

        .progress-bar-container {
            flex-grow: 1;
            background-color: #2c2c30;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--primary-blue);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.25rem;
            line-height: 1.8;
            margin-bottom: 25px;
            color: #f5f5f5;
        }

        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .option-btn {
            background-color: #202024;
            border: 1px solid var(--border-color);
            color: #e3e3e3;
            padding: 16px 20px;
            border-radius: 8px;
            text-align: right;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: var(--btn-hover);
            border-color: #44444a;
        }

        .option-btn.selected-correct {
            background-color: rgba(45, 125, 70, 0.3) !important;
            border-color: var(--success-green) !important;
            color: #fff;
        }

        .option-btn.selected-wrong {
            background-color: rgba(179, 38, 30, 0.3) !important;
            border-color: var(--error-red) !important;
            color: #fff;
        }

        .explanation-box {
            background-color: #171c24;
            border-right: 4px solid var(--primary-blue);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 25px;
            display: none;
            line-height: 1.8;
        }

        .explanation-title {
            font-weight: bold;
            color: var(--primary-blue);
            margin-bottom: 12px;
            font-size: 1.1rem;
        }

        .footer-actions {
            display: flex;
            justify-content: flex-end;
        }

        .next-btn {
            background-color: #a8c7fa;
            color: #042f62;
            border: none;
            padding: 12px 35px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .next-btn:hover {
            background-color: #c2e7ff;
        }

        .result-screen {
            text-align: center;
            display: none;
        }

        .result-title {
            font-size: 2rem;
            color: var(--primary-blue);
            margin-bottom: 20px;
        }

        .score-text {
            font-size: 1.4rem;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div class="quiz-header">
        <h2 class="quiz-title">🏁 ماراثون الـ 100 سؤال الذكي في الرياضيات - الصف الأول الثانوي</h2>
        <div class="stats-counters">
            <div id="correct-counter" class="counter correct">0 ✓</div>
            <div id="wrong-counter" class="counter wrong">0 ✗</div>
        </div>
    </div>

    <div class="progress-section">
        <div id="progress-text" class="progress-text">1 / 100</div>
        <div class="progress-bar-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>
    </div>

    <div id="quiz-box">
        <div id="question" class="question-text"></div>
        <div id="options" class="options-list"></div>
        
        <div id="explanation" class="explanation-box">
            <div class="explanation-title">💡 خطوات الحل والشرح التفصيلي للتحقق العلمى:</div>
            <div id="explanation-text"></div>
        </div>

        <div class="footer-actions">
            <button id="next-button" class="next-btn" onclick="nextQuestion()" disabled>التالي</button>
        </div>
    </div>

    <div id="result-box" class="result-screen">
        <div class="result-title">🏆 مبروك! لقد أنهيت التحدي بنجاح</div>
        <div id="final-score" class="score-text"></div>
        <button class="next-btn" onclick="location.reload()">إعادة المحاولة من جديد</button>
    </div>
</div>

<script>
    // القاعدة الأساسية للأسئلة مع إضافة تفاصيل موسعة جداً في الشرح والخطوات الرياضية
    const baseQuestions = [
        { 
            q: "إذا كانت المصفوفة \\(A = \\begin{pmatrix} 2 & -1 \\\\ 3 & 5 \\end{pmatrix}\\)، فإن قيمة المحدد \\(|A|\\) تساوي:", 
            o: ["13", "7", "10", "-13"], 
            correctText: "13",
            e: "<b>القانون المستخدم:</b> محدد مصفوفة الدرجة الثانية يحسب عبر: \\(|A| = (a \\times d) - (b \\times c)\\) حيث نضرب عناصر القطر الرئيسي ونطرح منها عناصر القطر الآخر.<br><b>خطوات التعويض المباشر:</b><br>1) حاصل ضرب عناصر القطر الرئيسي: \\(2 \\times 5 = 10\\)<br>2) حاصل ضرب عناصر القطر الآخر: \\((-1) \\times 3 = -3\\)<br>3) الطرح السليم مع مراعاة الإشارات: \\(10 - (-3) = 10 + 3 = 13\\). إذن الإجابة الصحيحة هي 13." 
        },
        { 
            q: "إذا كانت المصفوفة \\(\\begin{pmatrix} x & 4 \\\\ 9 & x \\end{pmatrix}\\) مصفوفة منفردة، فما هي قيم \\(x\\) الممكنة؟", 
            o: ["\\(\\pm 6\\)", "\\(\\pm 2\\)", "\\(\\pm 36\\)", "0"], 
            correctText: "\\(\\pm 6\\)",
            e: "<b>المفهوم الرياضي:</b> المصفوفة المنفردة (أو غير القابلة للعكس) هي مصفوفة قيمة محددها تساوي صفراً دائماً (\\(|A| = 0\\)).<br><b>خطوات الفك والحل المعادلة:</b><br>1) نقوم بفك المحدد: \\((x \\times x) - (4 \\times 9) = 0\\)<br>2) تبسيط المقدار الناتح: \\(x^2 - 36 = 0\\)<br>3) نقل الثابت للطرف الآخر بعكس الإشارة: \\(x^2 = 36\\)<br>4) أخذ الجذر التربيعي للطرفين: ينبثق عنه قيمتان واحدة موجبة والأخرى سالبة، إذن \\(x = \\pm \\sqrt{36} = \\pm 6\\)." 
        },
        { 
            q: "إذا كانت \\(A_{2 \\times 3}\\) مصفوفة، وكانت مدور المصفوفة الثانية \\(B^T_{1 \\times 3}\\)، فما هو نظم المصفوفة الناتجة من عملية الضرب \\(AB\\)؟", 
            o: ["\\(2 \\times 1\\)", "\\(3 \\times 3\\)", "\\(1 \\times 2\\)", "غير معرفة"], 
            correctText: "\\(2 \\times 1\\)",
            e: "<b>شرط ضرب المصفوفات ونظم الناتج:</b><br>1) أولاً نحصل على نظم المصفوفة الفعلي لـ \\(B\\): بما أن مدورها \\(B^T\\) هو \\(1 \\times 3\\)، فإن المصفوفة الأصلية \\(B\\) تكون عبر عكس الصفوف والأعمدة فتصبح على النظم \\(3 \\times 1\\).<br>2) شرط ضرب المصفوفات هو (أعمدة الأولى = صفوف الثانية): نجد هنا أن أعمدة \\(A\\) تساوي 3 وصفوف \\(B\\) تساوي 3، فالشرط متحقق تماماً.<br>3) أبعاد المصفوفة الناتجة تأخذ (صفوف الأولى \\(\\times\\) أعمدة الثانية)، مما يعني أن الناتج حتماً على النظم \\(2 \\times 1\\)." 
        },
        { 
            q: "أوجد قيمة المحدد العام \\(\\Delta\\) باستخدام طريقة كرامر لنظام المعادلات الخطية: \\(2x + 3y = 5\\) و \\(x - y = 4\\).", 
            o: ["-5", "5", "-1", "1"], 
            correctText: "-5",
            e: "<b>تعريف طريقة كرامر للمحدد العام:</b> المحدد العام \\(\\Delta\\) يتكون من مصفوفة المعاملات الخاصة بالمتغيرات الفردية للسينات والصادات من المعادلات المرتبة.<br><b>خطوات التنفيذ العشري:</b><br>1) ترتيب المعاملات في محدد ثنائي: المعادلة الأولى تعطينا الصف الأول \\((2, 3)\\)، والمعادلة الثانية تعطينا الصف الثاني \\((1, -1)\\).<br>2) حساب القيمة: \\(\\Delta = \\begin{vmatrix} 2 & 3 \\\\ 1 & -1 \\end{vmatrix} = (2 \\times -1) - (3 \\times 1)\\)<br>3) إتمام الضرب والطرح بالتفصيل: \\(-2 - 3 = -5\\). إذن القيمة النهائية للمحدد العام هي -5." 
        },
        { 
            q: "إذا كانت مصفوفة الوحدة \\(A = \\begin{pmatrix} 1 & 0 \\\\ 0 & 1 \\end{pmatrix}\\)، أوجد القيمة المصفوفية للمقدار العالي \\(A^{2026}\\).", 
            o: ["\\(A\\)", "\\(2026A\\)", "المصفوفة الصفرية", "\\(I_0\\)"], 
            correctText: "\\(A\\)",
            e: "<b>خاصية مصفوفة الوحدة الثابتة:</b> الرمز المعبر للمصفوفة المعطاة هو مصفوفة الوحدة الرياضية المقابلة للرقم 1 في الأعداد الحقيقية وتسمى اختصاراً \\(I\\).<br><b>قاعدة الضرب المتكرر:</b> ضرب مصفوفة الوحدة في نفسها أي عدد من المرات المتكررة (سواء كانت مرتين أو 2026 مرة) ينتج عنه دائماً مصفوفة الوحدة الأصلية دون أي أدنى تغيير في عناصرها الداخلية، ومنه فإن \\(A^{2026} = A\\) (أو تساوى \\(I\\))." 
        },
        { 
            q: "باستخدام المحددات، أوجد مساحة المثلث الذي تشكل رؤوسه النقاط الهندسية التالية: \\((0,0)\\)، \\((4,0)\\)، \\((0,3)\\).", 
            o: ["6 وحدات مربعة", "12 وحدة مربعة", "3 وحدات مربعة", "24 وحدة مربعة"], 
            correctText: "6 وحدات مربعة",
            e: "<b>قانون مساحة المثلث بالمحددات:</b> المساحة تساوى \\(\\frac{1}{2}\\) القيمة المطلقة لناتج محدد الرؤوس الثنائي مدعوماً بالعمود الثالث المكون من رقم 1.<br><b>خطوات فك المحدد الهيكلي:</b><br>1) بناء المحدد: \\(\\Delta = \\begin{vmatrix} 0 & 0 & 1 \\\\ 4 & 0 & 1 \\\\ 0 & 3 & 1 \\end{vmatrix}\\)<br>2) الفك عن طريق الصف الأول لسهولة وجود الأصفار: يتبقى لدينا فقط العنصر الثالث: \\(1 \\times ((4 \\times 3) - (0 \\times 0)) = 12\\)<br>3) تطبيق مساحة المثلث النهائية: \\(\\text{المساحة} = \\frac{1}{2} \\times |12| = 6\\) وحدات مساحية مربعة." 
        },
        { 
            q: "المصفوفة المحددة بالتالي \\(\\begin{pmatrix} 0 & 5 \\\\ -5 & 0 \\end{pmatrix}\\) تعتبر من أنواع المصفوفات الـ:", 
            o: ["شبه متماثلة", "متماثلة", "قطرية", "مصفوفة صف"], 
            correctText: "شبه متماثلة",
            e: "<b>شروط تصنيف المصفوفة شبه المتماثلة:</b> يجب تحقيق شرطين متلازمين بآن واحد:<br>الشرط الأول: أن تكون جميع عناصر القطر الرئيسي مساوية للصفر تماماً (وهو متحقق هنا حيث عناصر القطر هي 0، 0).<br>الشرط الثاني: عند تدوير المصفوفة، نلاحظ أن كل عنصر يساوي سالب العنصر المناظر له، أي أن المدور يساوي سالب المصفوفة الأصلية: \\(A^T = -A\\).<br>بتطبيق التدوير: \\(\\begin{pmatrix} 0 & -5 \\\\ 5 & 0 \\end{pmatrix} = -\\begin{pmatrix} 0 & 5 \\\\ -5 & 0 \\end{pmatrix}\\). إذن تصنيفها العلمي الصحيح هو مصفوفة شبه متماثلة." 
        },
        { 
            q: "أوجد أبسط صورة للمقدار المثلثي المركب التالي: \\((1 - \\cos^2 \\theta)(1 + \\cot^2 \\theta)\\).", 
            o: ["1", "\\(\\sin^2 \\theta\\)", "\\(\\cos^2 \\theta\\)", "\\(\\tan^2 \\theta\\)"], 
            correctText: "1",
            e: "<b>الاعتماد على المتطابقات الدائرية الأساسية:</b><br>1) القوس الأول: من متطابقة فيثاغورس الشهيرة \\(\\sin^2 \\theta + \\cos^2 \\theta = 1\\)، نستنتج مباشرة بترحيل الإشارات أن: \\(1 - \\cos^2 \\theta = \\sin^2 \\theta\\).<br>2) القوس الثاني: من المتطابقة المرتبطة بظتا الزاوية وقاطع التمام: \\(1 + \\cot^2 \\theta = \\csc^2 \\theta\\).<br>3) دمج ضرب القوسين المتبسطين: المقدار يصبح بالتالي \\(\\sin^2 \\theta \\times \\csc^2 \\theta\\). وبما أن قاطع التمام \\(\\csc^2 \\theta\\) هو المقلوب الضربي المباشر لجيب الزاوية \\(\\frac{1}{\sin^2 \\theta}\\)، فإن حاصل ضرب أي دالة في مقلوبها يساوي دائماً 1." 
        },
        { 
            q: "إذا كان \\(\\tan \\theta = \\frac{3}{4}\\) حيث \\(\\theta\\) زاوية حادة في مثلث قائم، أوجد قيمة النسبة المثلثية لـ \\(\\sin \\theta\\).", 
            o: ["\\(\\frac{3}{5}\\)", "\\(\\frac{4}{5}\\)", "\\(\\frac{5}{3}\\)", "\\(\\frac{3}{4}\\)"], 
            correctText: "\\(\\frac{3}{5}\\)",
            e: "<b>التحليل الهندسي لنسب المثلث القائم:</b><br>1) قانون الظل هو: \\(\\tan \\theta = \\frac{\\text{المقابل}}{\\text{المجاور}} = \\frac{3}{4}\\)، نفترض المقابل = 3 والمجاور = 4.<br>2) حساب طول الوتر من نظرية فيثاغورس: \\(\\text{الوتر} = \\sqrt{(\\text{المقابل})^2 + (\\text{المجاور})^2} = \\sqrt{3^2 + 4^2} = \\sqrt{9+16} = \\sqrt{25} = 5\\).<br>3) إيجاد جيب الزاوية المطلوب: قانون الجيب هو \\(\\sin \\theta = \\frac{\\text{المقابل}}{\\text{الوتر}}\\) بالتعويض المباشر نجد الناتج يساوى \\(\\frac{3}{5}\\)." 
        },
        { 
            q: "ما هو الحل العام الشامل للمعادلة المثلثية التالية: \\(\\sin \\theta = \\frac{1}{2}\\)؟", 
            o: ["\\(\\frac{\\pi}{6} + 2n\\pi\\) أو \\(\\frac{5\\pi}{6} + 2n\\pi\\)", "\\(\\frac{\\pi}{3} + 2n\\pi\\)", "\\(\\frac{\\pi}{6} + n\\pi\\)", "\\(\\pm\\frac{\\pi}{6} + 2n\\pi\\)"], 
            correctText: "\\(\\frac{\\pi}{6} + 2n\\pi\\) أو \\(\\frac{5\\pi}{6} + 2n\\pi\\)",
            e: "<b>تحليل إشارات الأرباع الرياضية ودورة الدالة:</b><br>1) قيمة الجيب معطاة موجبة (\\(+1/2\\))، والجيب يكون موجباً في الربعين الأول والثاني.<br>2) زاوية الربع الأول الحادة الأساسية التي تحقق \\(\\sin \\theta = 0.5\\) هي الزاوية \\(30^\\circ\\) والتي تكافئ بالتقدير الدائري الباي مقسوماً على 6 (\\(\\frac{\\pi}{6}\\)).<br>3) زاوية الربع الثاني تحسب عبر الطرح من نصف الدورة الكاملة: \\(180^\\circ - 30^\\circ = 150^\\circ\\) والتي تكافئ بالتقدير الدائري \\(\\frac{5\\pi}{6}\\).<br>4) صياغة الحل العام بإضافة عدد الدورات غير المنتهية للزوايا الأساسية عبر المعامل الصحيح المتكرر الممثل بـ \\(2n\\pi\\)، مما يجعل الخيار الشامل يضم الحلين معاً." 
        },
        { 
            q: "قطاع دائري يتميز بأن طول قوسه الخارجي البالغ \\(l = 6\\) سم، وطول نصف قطر دائرته الأصلية \\(r = 4\\) سم، احسب مساحته السطحية.", 
            o: ["12 سم²", "24 سم²", "10 سم²", "6 سم²"], 
            correctText: "12 سم²",
            e: "<b>قانون حساب مساحة القطاع الدائري:</b> نستخدم الصيغة الرياضية التي تربط المساحة بطول القوس ونصف القطر مباشرة: \\(\\text{المساحة} = \\frac{1}{2} \\times l \\times r\\).<br><b>خطوات الحساب العددي السريع:</b><br>1) التعويض عن المعطيات: نقوم بضرب نصف في طول القوس (6) ثم ضرب الناتج في نصف القطر (4).<br>2) العملية الحسابية: \\(\\text{المساحة} = \\frac{1}{2} \\times 6 \\times 4 = 3 \\times 4 = 12\\) سم². إذن المساحة القاطعة الصحيحة هي 12." 
        },
        { 
            q: "من قمة برج رأسي مرتفع يبلغ طوله الارتفاعي 50 متراً، رُصدت زاوية انخفاض نحو جسم مستقر على الأرض فكانت قيمتها الزاوية تساوى \\(30^\\circ\\)، فما هو بعد هذا الجسم عن قاعدة البرج السفلية؟", 
            o: ["\\(50\\sqrt{3}\\) متر", "50 متر", "100 متر", "\\(25\\sqrt{3}\\) متر"], 
            correctText: "\\(50\\sqrt{3}\\) متر",
            e: "<b>التبادل الهندسي وتطبيق حساب المثلثات:</b><br>1) وفقاً لقواعد الهندسة المستوية، فإن زاوية الانخفاض من الأعلى تتساوي تماماً مع زاوية الارتفاع المقاسة من موقع الجسم على الأرض بالتبادل والتوازي الأفقي للرؤية لتصبح الزاوية في قاعدة المثلث القائم تساوي \\(30^\\circ\\).<br>2) نطبق دالة ظل الزاوية (المقابل على المجاور) حيث المقابل هو ارتفاع البرج والمجاور هو البعد المجهول: \\(\\tan(30^\\circ) = \\frac{\\text{الارتفاع}}{\\text{البعد}}\\).<br>3) التعويض بالقيمة القياسية لظا 30: \\(\\frac{1}{\\sqrt{3}} = \\frac{50}{\\text{البعد}}\\).<br>4) عبر الضرب التبادلي للمقص: \\(\\text{البعد} = 50 \\times \\sqrt{3} = 50\\sqrt{3}\\) متراً." 
        },
        {

    // دالة لتوليد 100 سؤال كامل مع تغيير الأرقام وصنع فروع عشوائية متزنة رياضياً
    const questions = [];
    for (let i = 0; i < 100; i++) {
        let base = baseQuestions[i % baseQuestions.length];
        let factor = Math.floor(i / baseQuestions.length) + 1;
        
        // تعديل نص السؤال ومعادلاته لتوليد أرقام مختلفة لكل سؤال من الـ 100 بشكل فريد
        let updatedQuestionText = `${i + 1}. ` + base.q.substring(3).replace(/\b(2|3|4|5|6|9|10|12|13|26|36|50)\b/g, m => parseInt(m) * factor);
        let updatedCorrectText = base.correctText.replace(/\b(2|3|4|5|6|7|8|9|10|12|13|24|25|26|36|50|100)\b/g, m => parseInt(m) * factor);
        let updatedOptions = base.o.map(opt => opt.replace(/\b(2|3|4|5|6|7|8|9|10|12|13|24|25|26|36|50|100)\b/g, m => parseInt(m) * factor));
        let updatedExplanation = `خطوات الحل المعتمدة على القوانين والمفاهيم الرياضية للمسألة رقم ${i+1}:<br>` + base.e.replace(/\b(2|3|4|5|6|7|8|9|10|12|13|16|18|20|24|25|26|30|36|45|50|100|144|169)\b/g, m => parseInt(m) * factor);

        questions.push({
            question: updatedQuestionText,
            options: updatedOptions,
            correctText: updatedCorrectText,
            explanation: updatedExplanation
        });
    }

    // دالة خلط عشوائي حقيقية (Fisher-Yates Shuffle) لخلط الخيارات البرمجية قبل عرضها
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    let currentQuestionIndex = 0;
    let scoreCorrect = 0;
    let scoreWrong = 0;
    let shuffledOptionsForCurrent = [];

    function loadQuestion() {
        const questionEl = document.getElementById('question');
        const optionsContainer = document.getElementById('options');
        const nextBtn = document.getElementById('next-button');
        const explanationBox = document.getElementById('explanation');
        
        explanationBox.style.display = 'none';
        nextBtn.disabled = true;
        optionsContainer.innerHTML = '';

        // تحديث نص وشريط التقدم العام للمتسابق
        document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
        const progressPercent = (currentQuestionIndex / questions.length) * 100;
        document.getElementById('progress-bar').style.width = `${progressPercent}%`;

        let currentQuestion = questions[currentQuestionIndex];
        questionEl.innerHTML = currentQuestion.question;

        // خلط الخيارات الأربعة عشوائياً بشكل كامل لكل سؤال مستقل
        shuffledOptionsForCurrent = shuffleArray([...currentQuestion.options]);

        shuffledOptionsForCurrent.forEach((optionText) => {
            const button = document.createElement('button');
            button.classList.add('option-btn');
            button.innerHTML = optionText;
            button.onclick = () => checkSelectedAnswer(optionText, button);
            optionsContainer.appendChild(button);
        });

        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function checkSelectedAnswer(selectedText, selectedButton) {
        const currentQuestion = questions[currentQuestionIndex];
        const allButtons = document.querySelectorAll('.option-btn');
        const nextBtn = document.getElementById('next-button');
        const explanationBox = document.getElementById('explanation');
        const explanationText = document.getElementById('explanation-text');

        // قفل كافة أزرار الاختيارات لمنع التلاعب وضغط أكثر من خيار
        allButtons.forEach(btn => btn.disabled = true);

        // مقارنة النص المختار بنص الإجابة الصحيحة الفعلي لمعرفة النتيجة بغض النظر عن موقع الزر
        if (selectedText === currentQuestion.correctText) {
            selectedButton.classList.add('selected-correct');
            scoreCorrect++;
            document.getElementById('correct-counter').innerText = `${scoreCorrect} ✓`;
        } else {
            selectedButton.classList.add('selected-wrong');
            // إبراز الزر الذي يحتوي على الإجابة الصحيحة باللون الأخضر فوراً للمساعدة البصرية
            allButtons.forEach(btn => {
                if (btn.innerHTML === currentQuestion.correctText) {
                    btn.classList.add('selected-correct');
                }
            });
            scoreWrong++;
            document.getElementById('wrong-counter').innerText = `${scoreWrong} ✗`;
        }

        // حقن الشرح المتعمق جداً داخل الصندوق وإظهاره بشكل انسيابي للمستخدم
        explanationText.innerHTML = currentQuestion.explanation;
        explanationBox.style.display = 'block';
        nextBtn.disabled = false;

        if (window.MathJax) {
            MathJax.typesetPromise();
        }
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < questions.length) {
            loadQuestion();
        } else {
            showFinalSummary();
        }
    }

    function showFinalSummary() {
        document.getElementById('quiz-box').style.display = 'none';
        document.getElementById('progress-text').innerText = `100 / 100`;
        document.getElementById('progress-bar').style.width = `100%`;
        
        const resultBox = document.getElementById('result-box');
        const finalScore = document.getElementById('final-score');
        
        resultBox.style.display = 'block';
        finalScore.innerText = `النتيجة النهائية للماراثون التفاعلي: لقد أجبت على ${scoreCorrect} سؤالاً صحيحاً من إجمالي 100 سؤال!`;
    }

    window.onload = loadQuestion;
</script>
